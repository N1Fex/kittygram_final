volumes:
  static:
  media:
  pg_data:

services:
  db:
    image: postgres:13
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data/

  backend:
    image: ${{ secrets.DOCKER_USERNAME }}/kittygram_backend
    env_file: .env
    volumes:
      - static:/backend_static/
      - media:/var/www/kittygram/media
    depends_on:
      - db

  frontend:
    image: ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend
    env_file: .env
    command: cp -r /app/build/. /static/
    volumes:
      - static:/static/
  gateway:
    image: ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway
    env_file: .env
    ports:
      - "9000:80"
    volumes:
      - static:/staticfiles/
    depends_on:
      - backend
      - frontend
